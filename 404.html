<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(150deg, #1B5ECC 0%, #0D2A50 55%, #081D38 100%);

}
.wrap {

.logo { margin-bottom: 48px; }
.logo img { height: 32px; filter: brightness(0) invert(1); opacity: 0.9; }

}

  font-size: 1rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
  margin-bottom: 40px;
}
.btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  background: #457FFD;
  color: #fff;
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  transition: background 0.2s;
}
.btn-primary:hover { background: #3B78D4; }
.btn-secondary {
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
